# Parameters for the recommender_als pipeline
recommender_als:
  als:
    user_col: user_idx
    item_col: item_idx
    rating_col: rating
    rank: 50
    maxIter: 10
    regParam: 0.1
    nonnegative: true
    implicitPrefs: false
    coldStartStrategy: drop
    seed: 42

  recommendations:
    k: 20

  evaluation:
    k_values: [10, 20]

  popularity_baseline:
    score_by: interaction_count

  # Path used internally by Spark to save the trained model
  model_path: data/06_models/als_model_spark

# Parameters for the recommender_lightgcn pipeline
recommender_lightgcn:
  data:
    positive_threshold: 4.0

  model:
    embedding_dim: 64
    n_layers: 3
    learning_rate: 0.001
    reg_weight: 0.0001
    batch_size: 2048
    epochs: 50
    seed: 42
    model_path: data/06_models/lightgcn_model.pt

  recommendations:
    k: 20
    score_batch_size: 256

  evaluation:
    k_values: [10, 20]

# Parameters for the recommender_sasrec pipeline
recommender_sasrec:
  data:
    max_seq_len: 50
    min_sequence_length: 1
    item_id_offset: 1
    test_history_policy: train_plus_validation

  model:
    max_seq_len: 50
    hidden_size: 64
    inner_size: 256
    n_layers: 2
    n_heads: 2
    dropout: 0.2
    learning_rate: 0.001
    batch_size: 256
    epochs: 50
    seed: 42
    model_path: data/06_models/sasrec_model.pt

  recommendations:
    k: 20
    item_id_offset: 1

  evaluation:
    k_values: [10, 20]
    item_id_offset: 1
